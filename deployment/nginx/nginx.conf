# deployment/nginx/nginx.conf

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }
    # Resolve docker service names at request time so nginx can start
    # even if some containers are still booting.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;

        # -------------------------
        # Server Homepage
        # -------------------------
        location /static/ {
            alias /etc/nginx/static/;
            try_files $uri =404;
        }
        location / {
            root /etc/nginx/templates;
            index index.html;
        }

        location = /favicon.ico {
            access_log off;
            log_not_found off;
            return 204;
        }
        # -------------------------
        # API
        # -------------------------
        location /api/ {
            set $api_upstream api:8000;
            rewrite ^/api/?(.*)$ /$1 break;
            proxy_pass http://$api_upstream;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /api;
            proxy_redirect ~^/(.*)$ /api/$1;
        }

        # -------------------------
        # Auth API
        # -------------------------
        location /auth/ {
            set $auth_upstream auth:8000;
            proxy_pass http://$auth_upstream;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /auth;
        }

        location = /airflow {
            return 301 /airflow/;
        }

        # -------------------------
        # Airflow UI
        # -------------------------
        location /airflow/ {
            set $airflow_upstream airflow-webserver:8080;
            proxy_pass http://$airflow_upstream;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_redirect off;
        }

        # -------------------------
        # Prometheus
        # -------------------------
        location /prometheus/ {
            set $prometheus_upstream prometheus:9090;
            rewrite ^/prometheus/?(.*)$ /$1 break;
            proxy_pass http://$prometheus_upstream;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /prometheus;
        }

        # -------------------------
        # Alertmanager
        # -------------------------
        location /alerts/ {
            set $alertmanager_upstream alertmanager:9093;
            rewrite ^/alerts/?(.*)$ /$1 break;
            proxy_pass http://$alertmanager_upstream;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /alerts;
            proxy_redirect ~^/(.*)$ /alerts/$1;
        }

        # -------------------------
        # cAdvisor
        # -------------------------
        location /cadvisor/ {
            set $cadvisor_upstream cadvisor:8080;
            proxy_pass http://$cadvisor_upstream;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /cadvisor;
        }

        # -------------------------
        # Node Exporter
        # -------------------------
        location = /metrics {
            return 301 $scheme://$http_host/node/metrics;
        }

        location /node/ {
            set $node_upstream node-exporter:9100;
            rewrite ^/node/?(.*)$ /$1 break;
            proxy_pass http://$node_upstream;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /node;
            proxy_redirect ~^/(.*)$ /node/$1;
        }

        location = /grafana {
            return 301 /grafana/;
        }

        # -------------------------
        # Grafana
        # -------------------------
        location /grafana/ {
            set $grafana_upstream grafana:3000;
            proxy_pass http://$grafana_upstream;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /grafana;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_http_version 1.1;
            proxy_read_timeout 300;
        }

    }
}
