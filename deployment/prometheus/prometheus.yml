# deployment/prometheus/prometheus.yml

global:
  scrape_interval: 15s

scrape_configs:
  # Self Exposer
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # System Metrics
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]

  # Docker container metrics
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

# Alerts
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

# Rules
rule_files:
  - "alert_rules.yml"
  - "recording_rules.yml"