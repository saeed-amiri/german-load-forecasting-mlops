# deployment/grafana/provisioning/dashboards/dashboard_config.yml

apiVersion: 1

providers:
  - name: 'default'
    orgId: 1
    folder: 'Platform Monitoring'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
