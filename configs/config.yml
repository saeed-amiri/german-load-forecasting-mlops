# configs/config.yaml

paths:
  raw_data: "data/raw/time_series-2020-10-06.csv"
  processed_data: "data/processed/processed.csv"
  database: "data/database.db"



# Parameters for SQL handeling
sql:
  root: sql
  chunk_size: 50000
  tables:
    target: "german_load_clean"
  entrypoints:
    data:
      ingestion:
        transform: "00_transform.sql"
      preprocessing:
        quality_check: "quality_check.sql"
    api:
      target_view: "target_view.sql"


# logging settings for pipeline services
logging:
  level: "INFO"
  to_console: true
  service_logs:
    ingestion: "ingest.log"
    preprocessing: "preprocess.log"


# API settings
api:
  templates: "services/api/templates"
