# configs/config.yaml

paths:
  raw_data: "data/raw/time_series-2020-10-06.csv"
  processed_data: "data/processed/processed.csv"
  database: "data/database.db"



# Parameters for SQL handeling
# Parameters for SQL handling
sql:
  root: sql
  chunk_size: 50000
  tables:
    staging: "stg_german_load"          # Layer 1 - clean staging table
    features: "fct_german_load"         # Layer 2 - ML-ready features table
    marts: "german_load_api"            # Layer 3 - API / serving table
  entrypoints:
    staging:
      stg_german_load: "staging/stg_german_load.sql"
    features:
      fct_german_load: "features/fct_german_load.sql"
    marts:
      german_load_api: "marts/german_load_api.sql"
    quality:
      data_quality_checks: "quality/data_quality_checks.sql"


# logging settings for pipeline services
logging:
  level: "INFO"
  to_console: true
  service_logs:
    ingestion: "ingest.log"
    preprocessing: "preprocess.log"


# API settings
api:
  templates: "services/api/templates"
