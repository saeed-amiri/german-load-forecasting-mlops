# configs/inputs/training.yml
common:
  database:
    name: processed.parquet
  target_column: load_actual
  train_columns:
    - solar_actual
    - wind_actual
    - wind_onshore
    - wind_offshore
    - hour_of_day
    - day_of_week
    - load_actual_lag_1
    - load_actual_lag_24

ofiles:
  ofmt: joblib
  best_params: best_params
  predictions: predictions


sql:
  files:
    load: load_processed_data.sql
  tables:
    load: placeholder


evaluation:
  metrics:
    - mae
    - rmse
  cv_folds: 3
  scoring: neg_mean_absolute_error
  save_predictions: true


models:
  gbc:
    model_id: gbr
    param_grid:
      n_estimators: [200, 500]
      max_depth: [5, 8]
      min_samples_split: [5, 10]
      learning_rate: [0.01, 0.05]
    train_size: 0.8
    evaluation_override:
      metrics:
        - mae
        - rmse
