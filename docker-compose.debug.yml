# docker-compose.debug.yml
# Optional local debug overrides: publish selected monitoring ports on localhost only.

services:
  api:
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"

  auth:
    ports:
      - "127.0.0.1:${AUTH_PORT:-8002}:8000"

  airflow-webserver:
    ports:
      - "127.0.0.1:${AIRFLOW_PORT:-8082}:8080"

  prometheus:
    ports:
      - "127.0.0.1:9090:9090"

  alertmanager:
    ports:
      - "127.0.0.1:9093:9093"

  node-exporter:
    ports:
      - "127.0.0.1:9100:9100"

  cadvisor:
    ports:
      - "127.0.0.1:8081:8080"
