# docker-compose.debug.yml
# Optional local debug overrides: publish selected monitoring ports on localhost only.

services:
  prometheus:
    ports:
      - "127.0.0.1:9090:9090"

  alertmanager:
    ports:
      - "127.0.0.1:9093:9093"

  node-exporter:
    ports:
      - "127.0.0.1:9100:9100"

  cadvisor:
    ports:
      - "127.0.0.1:8081:8080"
