# docker-compose.yml

services:
  # ------------------------------------
  # Monitoring: Prometheus & Grafana
  # ------------------------------------
  # Prometheus: General
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: load-forecast-prometheus
    volumes:
      - ./deployment/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deployment/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - ./deployment/prometheus/recording_rules.yml:/etc/prometheus/recording_rules.yml:ro
      - prometheus_data:/prometheus
    # ports:
    # Exposed through nginx by default. For direct local debugging,
    # use docker-compose.debug.yml.
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.external-url=http://localhost:8080/prometheus/"
      - "--web.route-prefix=/"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    networks:
      - backend
    restart: unless-stopped

  # Prometheus: System Metrics
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: load-forecast-node-exporter
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    # ports:
    # Exposed through nginx by default. For direct local debugging,
    # use docker-compose.debug.yml.
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - backend
    restart: unless-stopped

  # Prometheus: Docker container metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: load-forecast-cadvisor
    environment:
      - CADVISOR_HEALTHCHECK_URL=http://localhost:8080/cadvisor/healthz
    command:
      - "--url_base_prefix=/cadvisor"
    # ports:
    # Exposed through nginx by default. For direct local debugging,
    # use docker-compose.debug.yml.
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      - backend
    restart: unless-stopped

  # Prometheus: Alerts
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: load-forecast-alertmanager
    # ports:
    # Exposed through nginx by default. For direct local debugging,
    # use docker-compose.debug.yml.
    volumes:
      - ./deployment/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.external-url=http://localhost:8080/alerts/"
      - "--web.route-prefix=/"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/ready"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    networks:
      - backend
    restart: unless-stopped

  # Grafana
  grafana:
    image: grafana/grafana:12.3.0
    container_name: load-forecast-grafana
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      - GF_SERVER_ROOT_URL=http://localhost:8080/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_METRICS_ENABLED=true
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./deployment/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./deployment/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./deployment/grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    networks:
      - backend
    restart: unless-stopped


  # ------------------------------------
  # NGinX: Reverse Proxy & Load Balancing
  # ------------------------------------
  
  nginx:
    image: nginx:1.27
    container_name: load-forecast-nginx
    ports:
    - "8080:80"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - backend
    restart: unless-stopped

  # ------------------------------------
  # Core: Data & Modeling
  # ------------------------------------

  base:
    build:
      context: .
      dockerfile: docker/base/Dockerfile
      args:
        - APP_UID=${APP_UID:-1000}
        - APP_GID=${APP_GID:-1000}
    image:
      load-forecast-base:${IMAGE_TAG:?IMAGE_TAG is required}
    networks:
      - backend

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
      args:
        BASE_IMAGE_TAG: ${IMAGE_TAG:?IMAGE_TAG is required}
    image:
      load-forecast-api:${IMAGE_TAG:?IMAGE_TAG is required}
    depends_on:
      base:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - backend
    restart: unless-stopped

  ingestion:
    build:
      context: .
      dockerfile: docker/ingestion/Dockerfile
      args:
        BASE_IMAGE_TAG: ${IMAGE_TAG:?IMAGE_TAG is required}
    image:
      load-forecast-ingestion:${IMAGE_TAG:?IMAGE_TAG is required}
    depends_on:
      base:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - backend

  preprocessing:
    build:
      context: .
      dockerfile: docker/preprocessing/Dockerfile
      args:
        BASE_IMAGE_TAG: ${IMAGE_TAG:?IMAGE_TAG is required}
    image:
      load-forecast-preprocessing:${IMAGE_TAG:?IMAGE_TAG is required}
    depends_on:
      ingestion:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - backend

  marts:
    build:
      context: .
      dockerfile: docker/marts/Dockerfile
      args:
        - BASE_IMAGE_TAG=${IMAGE_TAG:?IMAGE_TAG is required}
    image:
      load-forecast-marts:${IMAGE_TAG:?IMAGE_TAG is required}
    depends_on:
      preprocessing:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - backend

networks:
  backend:

volumes:
  prometheus_data:
  alertmanager_data:
  grafana-storage:
  