# docker-compose.yml

services:
  # ------------------------------------
  # Monitoring: Prometheus and Grafana
  # ------------------------------------
  # Prometheus: General
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: load-forecast-prometheus
    volumes:
      - ./deployment/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deployment/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - ./deployment/prometheus/recording_rules.yml:/etc/prometheus/recording_rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    restart: unless-stopped

  # Prometheus: System Metrics
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: load-forecast-node-exporter
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    restart: unless-stopped

  # Prometheus: Docker container metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: load-forecast-cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    restart: unless-stopped

  # Prometheus: Alerts
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: load-forecast-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./deployment/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    restart: unless-stopped

  # ------------------------------------
  # Core: Data and Modeling
  # ------------------------------------

  base:
    build:
      context: .
      dockerfile: docker/base/Dockerfile
      args:
        - APP_UID=${APP_UID:-1000}
        - APP_GID=${APP_GID:-1000}
    image:
      load-forecast-base:${IMAGE_TAG:-latest}

  ingestion:
    build:
      context: .
      dockerfile: docker/ingestion/Dockerfile
      args:
        BASE_IMAGE_TAG: ${IMAGE_TAG:-latest}
    image:
      load-forecast-ingestion:${IMAGE_TAG:-latest}
    depends_on:
      base:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

  preprocessing:
    build:
      context: .
      dockerfile: docker/preprocessing/Dockerfile
      args:
        BASE_IMAGE_TAG: ${IMAGE_TAG:-latest}  
    image:
      load-forecast-preprocessing:${IMAGE_TAG:-latest}
    depends_on:
      ingestion:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

  marts:
    build:
      context: .
      dockerfile: docker/marts/Dockerfile
      args:
        - BASE_IMAGE_TAG=${IMAGE_TAG:-latest}
    image:
      load-forecast-marts:${IMAGE_TAG:-latest}
    depends_on:
      preprocessing:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

volumes:
  prometheus_data:
  alertmanager_data:
  