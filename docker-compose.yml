# docker-compose.yml

services:
  # ------------------------------------
  # Monitoring: Prometheus & Grafana
  # ------------------------------------
  # Prometheus: General
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: load-forecast-prometheus
    volumes:
      - ./deployment/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deployment/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - ./deployment/prometheus/recording_rules.yml:/etc/prometheus/recording_rules.yml:ro
      - prometheus_data:/prometheus
    # ports:
    # Exposed through nginx by default. For direct local debugging,
    # use docker-compose.debug.yml.
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.external-url=http://localhost:8080/prometheus/"
      - "--web.route-prefix=/"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    networks:
      - backend
    restart: unless-stopped

  # Prometheus: System Metrics
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: load-forecast-node-exporter
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      # Some hosts expose duplicate hwmon PWM series (for example asus_wmi),
      # which causes gather errors in node-exporter logs.
      - "--no-collector.hwmon"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    # ports:
    # Exposed through nginx by default. For direct local debugging,
    # use docker-compose.debug.yml.
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - backend
    restart: unless-stopped

  # Prometheus: Docker container metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: load-forecast-cadvisor
    environment:
      - CADVISOR_HEALTHCHECK_URL=http://localhost:8080/cadvisor/healthz
    command:
      - "--url_base_prefix=/cadvisor"
    # ports:
    # Exposed through nginx by default. For direct local debugging,
    # use docker-compose.debug.yml.
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      - backend
    restart: unless-stopped

  # Prometheus: Alerts
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: load-forecast-alertmanager
    # ports:
    # Exposed through nginx by default. For direct local debugging,
    # use docker-compose.debug.yml.
    volumes:
      - ./deployment/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.external-url=http://localhost:8080/alerts/"
      - "--web.route-prefix=/"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/ready"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    networks:
      - backend
    restart: unless-stopped

  # Grafana
  grafana:
    image: grafana/grafana:12.3.0
    container_name: load-forecast-grafana
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      - GF_SERVER_ROOT_URL=http://localhost:8080/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_METRICS_ENABLED=true
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./deployment/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./deployment/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./deployment/grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    networks:
      - backend
    restart: unless-stopped


  # ------------------------------------
  # NGinX: Reverse Proxy & Load Balancing
  # ------------------------------------
  
  nginx:
    image: nginx:1.27
    container_name: load-forecast-nginx
    ports:
    - "8080:80"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deployment/nginx/html:/etc/nginx/html:ro
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - backend
    restart: unless-stopped

  # ------------------------------------
  # Orchestration: Airflow
  # ------------------------------------

  # Airflow metadata database
  airflow-postgres:
    image: postgres:15
    container_name: load-forecast-airflow-postgres
    environment:
      - POSTGRES_USER=${AIRFLOW_DB_USER:-airflow}
      - POSTGRES_PASSWORD=${AIRFLOW_DB_PASSWORD:-airflow}
      - POSTGRES_DB=${AIRFLOW_DB_NAME:-airflow}
    volumes:
      - airflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${AIRFLOW_DB_USER:-airflow} -d ${AIRFLOW_DB_NAME:-airflow}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend
    restart: unless-stopped

  # One-time DB migrations and admin user setup
  airflow-init:
    image: apache/airflow:2.9.3
    container_name: load-forecast-airflow-init
    depends_on:
      airflow-postgres:
        condition: service_healthy
    user: "0:0"
    environment:
      - AIRFLOW_UID=${AIRFLOW_UID:-50000}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-postgres/${AIRFLOW_DB_NAME:-airflow}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    command:
      - bash
      - -c
      - |
        set -e
        airflow db migrate
        airflow users delete --username "${AIRFLOW_ADMIN_USERNAME:-admin}" || true
        airflow users create --role "${AIRFLOW_ADMIN_ROLE:-Admin}" --username "${AIRFLOW_ADMIN_USERNAME:-admin}" --password "${AIRFLOW_ADMIN_PASSWORD:-admin}" --firstname "${AIRFLOW_ADMIN_FIRSTNAME:-Admin}" --lastname "${AIRFLOW_ADMIN_LASTNAME:-User}" --email "${AIRFLOW_ADMIN_EMAIL:-admin@example.com}"
        chown -R ${AIRFLOW_UID:-50000}:0 /opt/airflow/logs /opt/airflow/dags /opt/airflow/plugins
    networks:
      - backend

  # Airflow web UI
  airflow-webserver:
    image: apache/airflow:2.9.3
    container_name: load-forecast-airflow-webserver
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    user: "${AIRFLOW_UID:-50000}:0"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-postgres/${AIRFLOW_DB_NAME:-airflow}
      - AIRFLOW__WEBSERVER__BASE_URL=http://localhost:8080/airflow
      - AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX=True
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/airflow/health', timeout=3)",
        ]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    command: webserver
    networks:
      - backend
    restart: unless-stopped

  airflow-scheduler:
    image: apache/airflow:2.9.3
    container_name: load-forecast-airflow-scheduler
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    user: "${AIRFLOW_UID:-50000}:0"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-postgres/${AIRFLOW_DB_NAME:-airflow}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "airflow jobs check --job-type SchedulerJob --hostname $$HOSTNAME",
        ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s
    command: scheduler
    networks:
      - backend
    restart: unless-stopped


  # ------------------------------------
  # Core: Data & Modeling
  # ------------------------------------

  base:
    build:
      context: .
      dockerfile: docker/base/Dockerfile
      args:
        - APP_UID=${APP_UID:-1000}
        - APP_GID=${APP_GID:-1000}
    image:
      load-forecast-base:${IMAGE_TAG:?IMAGE_TAG is required}
    networks:
      - backend

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
      args:
        BASE_IMAGE_TAG: ${IMAGE_TAG:?IMAGE_TAG is required}
    image:
      load-forecast-api:${IMAGE_TAG:?IMAGE_TAG is required}
    depends_on:
      base:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - backend
    restart: unless-stopped

  auth:
    build:
      context: .
      dockerfile: docker/auth/Dockerfile
      args:
        BASE_IMAGE_TAG: ${IMAGE_TAG:?IMAGE_TAG is required}
    image:
      load-forecast-auth:${IMAGE_TAG:?IMAGE_TAG is required}
    depends_on:
      base:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/openapi.json', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - backend
    restart: unless-stopped

  ingestion:
    build:
      context: .
      dockerfile: docker/ingestion/Dockerfile
      args:
        BASE_IMAGE_TAG: ${IMAGE_TAG:?IMAGE_TAG is required}
    image:
      load-forecast-ingestion:${IMAGE_TAG:?IMAGE_TAG is required}
    depends_on:
      base:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - backend

  preprocessing:
    build:
      context: .
      dockerfile: docker/preprocessing/Dockerfile
      args:
        BASE_IMAGE_TAG: ${IMAGE_TAG:?IMAGE_TAG is required}
    image:
      load-forecast-preprocessing:${IMAGE_TAG:?IMAGE_TAG is required}
    depends_on:
      ingestion:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - backend

  marts:
    build:
      context: .
      dockerfile: docker/marts/Dockerfile
      args:
        - BASE_IMAGE_TAG=${IMAGE_TAG:?IMAGE_TAG is required}
    image:
      load-forecast-marts:${IMAGE_TAG:?IMAGE_TAG is required}
    depends_on:
      preprocessing:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - backend

networks:
  backend:

volumes:
  prometheus_data:
  alertmanager_data:
  grafana-storage:
  airflow_pgdata:
  