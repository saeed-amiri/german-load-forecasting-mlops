# docker-compose.yml

services:
  # ------------------------------------
  # Monitoring: Prometheus and Grafana
  # ------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: load-forecast-prometheus
    volumes:
      - ./deployment/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deployment/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - ./deployment/prometheus/recording_rules.yml:/etc/prometheus/recording_rules.yml:ro
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15s"
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: load-forecast-node-exporter
    ports:
      - "9100:9100"
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: load-forecast-cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/runs:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: load-forecast-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./deployment/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    restart: unless-stopped

  # ------------------------------------
  # Core: Data and Modeling
  # ------------------------------------

  base:
    build:
      context: .
      dockerfile: docker/base/Dockerfile
      args:
        - APP_UID=${APP_UID:-1000}
        - APP_GID=${APP_GID:-1000}
    image:
      load-forecast-base:${IMAGE_TAG:-latest}

  ingestion:
    build:
      context: .
      dockerfile: docker/ingestion/Dockerfile
      args:
        BASE_IMAGE_TAG: ${IMAGE_TAG:-latest}
    image:
      load-forecast-ingestion:${IMAGE_TAG:-latest}
    depends_on:
      base:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

  preprocessing:
    build:
      context: .
      dockerfile: docker/preprocessing/Dockerfile
      args:
        BASE_IMAGE_TAG: ${IMAGE_TAG:-latest}  
    image:
      load-forecast-preprocessing:${IMAGE_TAG:-latest}
    depends_on:
      ingestion:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

  marts:
    build:
      context: .
      dockerfile: docker/marts/Dockerfile
      args:
        - BASE_IMAGE_TAG=${IMAGE_TAG:-latest}
    image:
      load-forecast-marts:${IMAGE_TAG:-latest}
    depends_on:
      preprocessing:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
  